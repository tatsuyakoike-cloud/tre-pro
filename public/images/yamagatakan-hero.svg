<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" fill="none">
  <defs>
    <linearGradient id="dawn" x1="960" y1="0" x2="960" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a1410"/>
      <stop offset="35%" stop-color="#142820"/>
      <stop offset="65%" stop-color="#1a2e24"/>
      <stop offset="100%" stop-color="#0f1814"/>
    </linearGradient>
    <linearGradient id="goldMist" x1="0" y1="0" x2="1920" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#b08a3c" stop-opacity="0.06"/>
      <stop offset="50%" stop-color="#f7f1e3" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#7a1e1e" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="riverMist" x1="960" y1="500" x2="960" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f7f1e3" stop-opacity="0"/>
      <stop offset="40%" stop-color="#f7f1e3" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#f7f1e3" stop-opacity="0.14"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.035"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#dawn)"/>
  <rect width="1920" height="1080" fill="url(#goldMist)"/>

  <!-- distant mountains -->
  <path d="M0 520 C240 420 420 480 640 440 C860 400 1040 460 1280 430 C1520 400 1720 450 1920 410 L1920 1080 L0 1080 Z" fill="#0c1812" opacity="0.55"/>
  <!-- mid mountains -->
  <path d="M0 600 C180 540 360 580 560 550 C760 520 920 570 1120 540 C1320 510 1580 560 1920 530 L1920 1080 L0 1080 Z" fill="#122018" opacity="0.75"/>
  <!-- foreground ridge -->
  <path d="M0 680 C320 620 580 660 860 630 C1140 600 1420 650 1920 610 L1920 1080 L0 1080 Z" fill="#162820"/>

  <!-- valley mist / river fog -->
  <ellipse cx="960" cy="720" rx="780" ry="120" fill="url(#riverMist)" filter="url(#softBlur)"/>
  <ellipse cx="720" cy="760" rx="420" ry="70" fill="#f7f1e3" opacity="0.04" filter="url(#softBlur)"/>
  <ellipse cx="1200" cy="740" rx="380" ry="60" fill="#f7f1e3" opacity="0.035" filter="url(#softBlur)"/>

  <!-- onsen steam wisps -->
  <path d="M880 640 Q900 580 920 640 Q940 700 960 640 Q980 580 1000 640 Q1020 700 1040 640" stroke="#f7f1e3" stroke-opacity="0.08" stroke-width="2" fill="none" filter="url(#softBlur)"/>
  <path d="M760 680 Q780 620 800 680 Q820 740 840 680" stroke="#f7f1e3" stroke-opacity="0.05" stroke-width="1.5" fill="none" filter="url(#softBlur)"/>
  <path d="M1080 670 Q1100 610 1120 670 Q1140 730 1160 670" stroke="#f7f1e3" stroke-opacity="0.05" stroke-width="1.5" fill="none" filter="url(#softBlur)"/>

  <!-- subtle horizontal water lines -->
  <line x1="200" y1="780" x2="1720" y2="780" stroke="#f7f1e3" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="280" y1="810" x2="1640" y2="810" stroke="#f7f1e3" stroke-opacity="0.03" stroke-width="1"/>

  <!-- washi grain overlay -->
  <rect width="1920" height="1080" filter="url(#grain)" opacity="0.6"/>
</svg>
